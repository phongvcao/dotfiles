# This tmux statusbar config was created by tmuxline.vim
# on Tue, 30 Apr 2019

set -g status-justify "left"
set -g status "on"

# set -g status-attr "none"
# set -g status-bg "colour0"
set -g status-style bg=colour0,none

# set -g message-command-bg "colour11"
# set -g message-command-fg "colour8"
set -g message-command-style bg=colour11,fg=colour8

set -g status-left-length "100"

set -g pane-active-border-style fg=colour4

set -g pane-border-style fg=colour11

# set -g message-bg "colour11"
# set -g message-fg "colour8"
set -g message-style fg=colour3

# set -g status-left-attr "none"
# set -g status-right-attr "none"
set -g status-left-style none
set -g status-right-style none

set -g status-right-length "100"

# setw -g window-status-fg "colour14"
# setw -g window-status-attr "none"
setw -g window-status-style fg=colour14,none

# setw -g window-status-activity-fg "colour4"
# setw -g window-status-activity-bg "colour0"
# setw -g window-status-activity-attr "none"
setw -g window-status-activity-style fg=colour4,bg=colour0,none

setw -g window-status-separator ""

# setw -g window-status-bg "colour0"
setw -g window-status-style bg=colour0

set -g status-left "#[fg=colour8,bg=colour4] #S #[fg=colour4,bg=colour0,nobold,nounderscore,noitalics]"
set -g status-right "#[fg=colour11,bg=colour0,nobold,nounderscore,noitalics]#[fg=colour8,bg=colour11] %Y-%m-%d  %H:%M #[fg=colour14,bg=colour11,nobold,nounderscore,noitalics]#[fg=colour8,bg=colour14] #h "
setw -g window-status-format "#[fg=colour14,bg=colour0] #I #[fg=colour14,bg=colour0] #W "
setw -g window-status-current-format "#[fg=colour0,bg=colour11,nobold,nounderscore,noitalics]#[fg=colour8,bg=colour11] #I #[fg=colour8,bg=colour11] #W #[fg=colour11,bg=colour0,nobold,nounderscore,noitalics]"
