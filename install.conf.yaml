- defaults:
    link:
        create: true
        relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.tmux.conf: tmux.conf
    ~/.vim: vim
    ~/.vimrc: vimrc
  ~/.config/terminator:
      create: true
      path: config/terminator
  ~/.vim: vim
  ~/.vimrc:
      relink: true
      path: vimrc
  ~/.zshrc:
      force: true
      path: zshrc
  ~/.hammerspoon:
      if: '[ `uname` = Darwin ]'
      path: hammerspoon

- create:
    - ~/downloads
    - ~/.vim/undo-history

- shell:
    - [git submodule update --init --recursive, Installing submodules]
